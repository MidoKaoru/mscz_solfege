<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseScore 移動ド自動入力ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .description { font-size: 0.9em; color: #666; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .drop-zone { border: 3px dashed #3498db; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; background: #ebf5fb; transition: 0.3s; margin-bottom: 15px; }
        .drop-zone.dragover { background: #d4e6f1; border-color: #2980b9; }
        #status { text-align: center; font-weight: bold; margin-bottom: 20px; min-height: 1.5em; }
        .config-section { display: none; }
        .panel { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .panel-title { font-weight: bold; margin-bottom: 15px; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }
        .bulk-actions { font-size: 0.8em; font-weight: normal; }
        .bulk-btn { padding: 4px 10px; cursor: pointer; background: #fff; border: 1px solid #ccc; border-radius: 4px; margin-left: 5px; }
        .bulk-btn:hover { background: #f0f0f0; }
        .modulation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .modulation-item { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
        .part-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9em; }
        .global-settings { background: #fff8e1; border: 1px solid #ffe082; }
        button#execBtn { display: block; width: 100%; padding: 15px; font-size: 1.1em; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 10px; }
        button#execBtn:hover { background: #219150; }
        label { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 MuseScore 移動ド自動入力ツール</h2>
    <div class="description">
        短調の場合「ドレミ式/ラシド式」および「変名表記」を選択できます。<br>
    </div>

    <div class="drop-zone" id="dropZone">
        ここに .mscz ファイルをドロップ または クリックして選択
        <input type="file" id="fileInput" accept=".mscz" style="display: none;">
    </div>

    <div id="status"></div>

    <div id="configArea" class="config-section">
        <div class="panel">
            <div class="panel-title">
                1. 各区間の調性設定
                <div class="bulk-actions">
                    一括設定：
                    <button class="bulk-btn" onclick="setAllModes('major')">すべて長調</button>
                    <button class="bulk-btn" onclick="setAllModes('minor')">すべて短調</button>
                </div>
            </div>
            <div id="keyConfigList" class="modulation-grid"></div>
        </div>

        <div class="panel">
            <div class="panel-title">2. 対象の楽器を選択</div>
            <div class="part-list" id="partList"></div>
        </div>

        <div class="panel global-settings">
            <div class="panel-title">3. 短調の読み方・表記ルール (一括設定)</div>
            <div style="font-size: 0.9em;">
                <strong>▼ 短調の主音を何と呼ぶか</strong><br>
                <label><input type="radio" name="solfegeSystem" value="do" checked> ドレミ式 (主音=ド)</label>
                <label style="margin-left:20px;"><input type="radio" name="solfegeSystem" value="la"> ラシド式 (主音=ラ)</label>
                <br><br>
                <strong>▼ 派生音の表記形式</strong><br>
                <label><input type="radio" name="namingStyle" value="suffix" checked> 記号式 (ファ#, シb...)</label>
                <label style="margin-left:20px;"><input type="radio" name="namingStyle" value="hemi" > 変名式 (フィ, テ...)</label>
            </div>
        </div>

        <button id="execBtn">移動ドを書き込んでダウンロード</button>
    </div>
</div>

<script>
    let currentZip = null, mscxPath = null, mscxDoc = null, originalFileName = "", modulations = [];

    const namingSuffix = {
        0: "ド", 2: "レ", 4: "ミ", "-1": "ファ", 1: "ソ", 3: "ラ", 5: "シ",
        7: "ド#", 9: "レ#", 11: "ミ#", 6: "ファ#", 8: "ソ#", 10: "ラ#", 12: "シ#",
        "-5": "レ♭", "-3": "ミ♭", "-8": "ファ♭", "-6": "ソ♭", "-4": "ラ♭", "-2": "シ♭", "-7": "ド♭"
    };

    const namingHemi = {
        0: "ド", 2: "レ", 4: "ミ", "-1": "ファ", 1: "ソ", 3: "ラ", 5: "シ",
        7: "ディ", 9: "リ", 11: "ミ", 6: "フィ", 8: "シ", 10: "リ", 12: "ド",
        "-5": "ラ", "-3": "メ", "-8": "ミ", "-6": "セ", "-4": "レ", "-2": "テ", "-7": "シ"
    };

    const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput');
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function setAllModes(mode) {
        modulations.forEach((_, i) => {
            const radio = document.querySelector(`input[name="mode_${i}"][value="${mode}"]`);
            if (radio) radio.checked = true;
        });
    }

    async function handleFile(file) {
        if (!file || !file.name.endsWith('.mscz')) return;
        originalFileName = file.name.replace('.mscz', '');
        showStatus('blue', '解析中...');
        
        try {
            currentZip = await JSZip.loadAsync(file);
            const containerXml = await currentZip.file("META-INF/container.xml").async("string");
            const containerDoc = new DOMParser().parseFromString(containerXml, "text/xml");
            mscxPath = containerDoc.getElementsByTagName("rootfile")[0].getAttribute("full-path");
            mscxDoc = new DOMParser().parseFromString(await currentZip.file(mscxPath).async("string"), "text/xml");

            partList.innerHTML = '';
            const allStaves = Array.from(mscxDoc.getElementsByTagName('Staff'));
            const musicStaves = allStaves.filter(s => s.getElementsByTagName('Measure').length > 0);
            const parts = mscxDoc.getElementsByTagName('Part');
            for (let i = 0; i < parts.length; i++) {
                let name = parts[i].getElementsByTagName('longName')[0]?.textContent || parts[i].getElementsByTagName('trackName')[0]?.textContent || `Part ${i+1}`;
                name = name.replace(/<[^>]*>?/gm, '').trim();
                partList.innerHTML += `<label><input type="checkbox" name="targetPart" value="${i}" checked> ${name}</label>`;
            }

            modulations = [];
            const measures = musicStaves[0].getElementsByTagName('Measure');
            let lastAcc = null;
            for (let m = 0; m < measures.length; m++) {
                const keySig = measures[m].getElementsByTagName('KeySig')[0];
                const acc = keySig ? parseInt(keySig.getElementsByTagName('accidental')[0]?.textContent || "0") : (m === 0 ? 0 : null);
                if (acc !== null && acc !== lastAcc) {
                    lastAcc = acc;
                    modulations.push({ idx: m, label: m === 0 ? "最初" : `${m+1}小節` });
                }
            }

            keyConfigList.innerHTML = modulations.map((m, i) => `
                <div class="modulation-item">
                    <b>📍 ${m.label}</b><br>
                    <label><input type="radio" name="mode_${i}" value="major" checked> 長調</label>
                    <label style="margin-left:10px;"><input type="radio" name="mode_${i}" value="minor"> 短調</label>
                </div>
            `).join('');

            document.getElementById('configArea').style.display = 'block';
            showStatus('green', 'ファイルを読み込みました。');
        } catch (e) { showStatus('red', 'エラー: ' + e.message); }
    }

    document.getElementById('execBtn').onclick = async () => {
        const selectedParts = Array.from(document.querySelectorAll('input[name="targetPart"]:checked')).map(cb => parseInt(cb.value));
        const system = document.querySelector('input[name="solfegeSystem"]:checked').value;
        const naming = document.querySelector('input[name="namingStyle"]:checked').value;
        const userConfigs = modulations.map((_, i) => document.querySelector(`input[name="mode_${i}"]:checked`).value === 'minor');

        const allStavesExec = Array.from(mscxDoc.getElementsByTagName('Staff'));
        const musicStavesExec = allStavesExec.filter(s => s.getElementsByTagName('Measure').length > 0);

        selectedParts.forEach(idx => {
            const staff = musicStavesExec[idx];
            let prevAcc = null, currAcc = 0, prevSyl = null, tied = false, pending = false, pivot = false;

            const ms = staff.getElementsByTagName('Measure');
            for (let m = 0; m < ms.length; m++) {
                const modIdx = modulations.reduce((p, c, i) => (m >= c.idx ? i : p), 0);
                const isMinor = userConfigs[modIdx];
                const keySig = ms[m].getElementsByTagName('KeySig')[0];
                if (keySig) {
                    const acc = parseInt(keySig.getElementsByTagName('accidental')[0]?.textContent || "0");
                    if (acc !== currAcc) { prevAcc = currAcc; currAcc = acc; pivot = (m > 0); }
                }

                const chords = ms[m].getElementsByTagName('Chord');
                for (let c = 0; c < chords.length; c++) {
                    const notes = chords[c].getElementsByTagName('Note');
                    if (notes.length !== 1) { tied = false; continue; }

                    const pitch = parseInt(notes[0].getElementsByTagName('pitch')[0].textContent);
                    const tpc = parseInt(notes[0].getElementsByTagName('tpc')[0].textContent);
                    const nextTied = notes[0].getElementsByTagName('Tie').length > 0;

                    const getS = (p, t, a, mFlag) => {
                        let rootTpc = 14 + a;
                        if (mFlag && system === 'do') rootTpc += 3;
                        const diff = t - rootTpc;
                        const map = (naming === 'suffix') ? namingSuffix : namingHemi;
                        return map[diff] || "?";
                    };

                    let syl = getS(pitch, tpc, currAcc, isMinor);
                    let printTxt = syl;
                    let doPrint = false;

                    if (pivot && !tied) {
                        const prevIsMinor = userConfigs[Math.max(0, modIdx - 1)];
                        printTxt = `(${getS(pitch, tpc, prevAcc, prevIsMinor)}→)${syl}`;
                        doPrint = true; pivot = false; pending = false;
                    } else if (c === 0) {
                        if (tied) { pending = true; } else { doPrint = true; pending = false; }
                    } else if (!tied) {
                        if (pending || syl !== prevSyl) { doPrint = true; pending = false; }
                    }

                    if (doPrint) addLyrics(mscxDoc, chords[c], printTxt);
                    prevSyl = syl; tied = nextTied;
                }
            }
        });

        const blob = await currentZip.file(mscxPath, new XMLSerializer().serializeToString(mscxDoc)).generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `${originalFileName}_solfege.mscz`; a.click();
        showStatus('green', '完了しました！');
    };

    function addLyrics(xmlDoc, chordNode, text) {
        const existingLyrics = Array.from(chordNode.getElementsByTagName('Lyrics'));
        const targetLyric = existingLyrics.find(l => l.getElementsByTagName('no')[0]?.textContent === "1");

        if (targetLyric) {
            const textNode = targetLyric.getElementsByTagName('text')[0];
            if (textNode) {
                textNode.textContent = textNode.textContent + " " + text;
            }
        } else {
            const lyrics = xmlDoc.createElement('Lyrics');
            const no = xmlDoc.createElement('no');
            no.textContent = "1";
            const tNode = xmlDoc.createElement('text');
            tNode.textContent = text;
            lyrics.appendChild(no);
            lyrics.appendChild(tNode);
            chordNode.appendChild(lyrics);
        }
    }
    function showStatus(c, m) { const s = document.getElementById('status'); s.style.color = c; s.innerText = m; }
</script>
</body>
</html>
